<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Jeux</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
    <style>
        :root {
            color-scheme: light;
            --primary: #1f5bd8;
            --primary-dark: #123f9f;
            --accent: #0f9d7a;
            --danger: #d83a3a;
            --surface: #ffffff;
            --surface-soft: #f8f9fe;
            --border: #d5ddeb;
            --text: #111827;
            --muted: #4b5563;
            --shadow: 0 16px 40px rgba(17, 24, 39, 0.12);
        }

        body.dark-theme {
            color-scheme: dark;
            --primary: #6ea8ff;
            --primary-dark: #4b87e8;
            --accent: #39d2b2;
            --danger: #ff7a7a;
            --surface: #111827;
            --surface-soft: #1f2937;
            --border: #374151;
            --text: #f9fafb;
            --muted: #cbd5e1;
            --shadow: 0 16px 40px rgba(2, 6, 23, 0.45);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(31, 91, 216, 0.16), transparent 30%),
                linear-gradient(135deg, #f9fbff 0%, #eef5ff 100%);
            margin: 0;
            padding: 24px 16px 40px;
            color: var(--text);
            min-height: 100vh;
        }

        #app {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 2.05rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0 0 2px;
            color: var(--muted);
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow);
        }

        .game-grid {
            display: grid;
            gap: 12px;
        }

        .game-button {
            width: 100%;
            border: 1px solid var(--border);
            padding: 15px 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-soft) 100%);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
        }

        .game-button:active { transform: scale(0.98); }
        .game-button:hover { box-shadow: 0 12px 24px rgba(91, 124, 255, 0.16); border-color: #d3dbf5; }
        .game-button strong { display: block; margin-bottom: 4px; font-size: 1.05rem; }
        .game-button small { color: var(--muted); font-weight: 600; font-size: 0.95rem; }

        .game-button.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; }
        .game-button.primary small { color: rgba(255,255,255,0.9); }

        .players-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background: linear-gradient(145deg, var(--surface), var(--surface-soft));
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
        }

        .player-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
        }

        .player-name-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1.02rem;
            background: var(--surface-soft);
            color: var(--text);
        }
        .score-display { font-size: 1.85rem; font-weight: 800; color: var(--primary); min-width: 68px; text-align: center; }
        .buttons { display: flex; gap: 8px; }
        .score-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }

        .icon-btn-container {
            position: relative;
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            padding: 9px 13px;
            font-size: 1rem;
            min-width: 42px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn-red {
            background-color: var(--danger);
        }

        .icon-btn-green {
            background-color: var(--accent);
        }

        .icon-btn-green i,
        .icon-btn-red i {
            font-size: 1rem;
        }
        .score-input {
            width: 78px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1.02rem;
            text-align: center;
            height: 40px;
            background: var(--surface-soft);
            color: var(--text);
        }

        button {
            border: none;
            padding: 10px 16px;
            font-size: 1.02rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.2s ease;
        }

        button:active { transform: scale(0.96); }
        .btn-minus, .btn-plus {
            padding: 8px 12px;
            font-size: 1rem;
            min-width: 44px;
            box-shadow: 0 8px 16px rgba(17, 24, 39, 0.1);
        }
        .btn-minus { background: linear-gradient(135deg, #ff6b6b, var(--danger)); color: white; }
        .btn-plus { background: linear-gradient(135deg, #34d4b1, var(--accent)); color: white; }
        .btn-secondary {
            background: linear-gradient(135deg, var(--surface-soft), var(--surface));
            color: var(--text);
            width: 100%;
            border: 1px solid var(--border);
        }
        .btn-reset {
            background: linear-gradient(135deg, #64748b, #475569);
            color: white;
            width: 100%;
            box-shadow: 0 10px 20px rgba(71, 85, 105, 0.18);
        }

        .field {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .field label {
            min-width: 110px;
            white-space: nowrap;
        }

        .field input[type="number"], .field .setup-name-input {
            flex: 1;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .field-row .field {
            flex: 1;
            margin-top: 0;
        }

        .field-row input[type="number"] {
            width: 90px;
            min-width: 90px;
            padding: 10px 10px;
        }

        label { font-weight: 600; }
        input[type="number"] {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zinch-player-card {
            background: linear-gradient(145deg, var(--surface), var(--surface-soft));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
        }

        .zinch-player-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.16);
        }

        .zinch-player-card.red {
            border-color: var(--danger);
            background: linear-gradient(145deg, #fff8f8, #fff2f2);
        }

        .zinch-player-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zinch-player-top .player-name-input {
            flex: 1;
        }

        .zinch-player-name {
            font-weight: 700;
            color: #444;
        }

        .zinch-total {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .zinch-last-lines {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .zinch-line {
            background: linear-gradient(135deg, #eef3ff, #f8faff);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 0.9rem;
            color: var(--text);
            border: 1px solid #e4ebfa;
        }

        .zinch-line.zinch {
            background: linear-gradient(135deg, #ffeaea, #fff3f3);
            color: var(--danger);
            border-color: #ffd6d6;
        }

        .zinch-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .zinch-undo-btn {
            background: linear-gradient(135deg, #ff5b5b 0%, #d63b3b 100%);
            color: white;
            min-width: 90px;
            width: auto;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(214, 59, 59, 0.25);
        }

        .setup-name-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            min-height: 36px;
        }

        .setup-name-input.is-muted {
            color: #8b95a5;
            background: #f7f8fa;
        }

        .zinch-input {
            width: 96px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            height: 38px;
            background: var(--surface-soft);
            color: var(--text);
        }

        .zinch-current {
            text-align: center;
            color: var(--primary);
            font-weight: 700;
        }

        .zinch-winner {
            text-align: center;
            font-weight: 700;
            color: #0f766e;
            background: #ecfeff;
            border: 1px solid #a7f3d0;
            border-radius: 999px;
            padding: 8px 12px;
        }

        .zinch-winner-finished {
            color: var(--danger);
            background: #fff5f5;
            border-color: #fecaca;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'jeux-app-state-v1';
        const THEME_KEY = 'jeux-theme';
        const DEFAULT_STATE = { screen: 'home', game: null, playerCount: 0, players: [], currentPlayerIndex: 0, undoStack: [], nextZinchValue: 250, winnerId: null, gameFinished: false };

        let appState = loadState();

        function loadState() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!saved) {
                    return { ...DEFAULT_STATE };
                }

                return {
                    ...DEFAULT_STATE,
                    ...saved,
                    players: (saved.players || []).map(player => ({
                        ...player,
                        history: Array.isArray(player.history) ? player.history : [],
                        entries: Array.isArray(player.entries) ? player.entries : []
                    })),
                    undoStack: Array.isArray(saved.undoStack) ? saved.undoStack : [],
                    nextZinchValue: typeof saved.nextZinchValue === 'number' ? saved.nextZinchValue : 250,
                    winnerId: typeof saved.winnerId === 'number' ? saved.winnerId : null,
                    gameFinished: typeof saved.gameFinished === 'boolean' ? saved.gameFinished : false
                };
            } catch (error) {
                return { ...DEFAULT_STATE };
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function applyTheme(theme) {
            document.body.classList.toggle('dark-theme', theme === 'dark');
            document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            localStorage.setItem(THEME_KEY, theme);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            applyTheme(savedTheme);
        }

        function snapshotState() {
            return {
                currentPlayerIndex: appState.currentPlayerIndex,
                nextZinchValue: appState.nextZinchValue,
                winnerId: appState.winnerId,
                gameFinished: appState.gameFinished,
                players: appState.players.map(player => ({
                    ...player,
                    history: Array.isArray(player.history) ? [...player.history] : [],
                    entries: Array.isArray(player.entries) ? player.entries.map(entry => ({ ...entry })) : []
                }))
            };
        }

        function saveUndoSnapshot() {
            appState.undoStack.push(snapshotState());
            if (appState.undoStack.length > 20) {
                appState.undoStack.shift();
            }
            saveState();
        }

        function undoLastAction() {
            if (appState.undoStack.length === 0) return;

            const snapshot = appState.undoStack.pop();
            appState.currentPlayerIndex = snapshot.currentPlayerIndex;
            appState.nextZinchValue = typeof snapshot.nextZinchValue === 'number' ? snapshot.nextZinchValue : 250;
            appState.winnerId = typeof snapshot.winnerId === 'number' ? snapshot.winnerId : null;
            appState.gameFinished = typeof snapshot.gameFinished === 'boolean' ? snapshot.gameFinished : false;
            appState.players = snapshot.players.map(player => ({
                ...player,
                history: Array.isArray(player.history) ? [...player.history] : [],
                entries: Array.isArray(player.entries) ? player.entries.map(entry => ({ ...entry })) : []
            }));
            saveState();

            if (appState.game === 'score') {
                renderScoreboard();
            } else if (appState.game === 'zinch') {
                renderZinchBoard();
            } else {
                renderHome();
            }
        }

        function renderHome() {
            appState.screen = 'home';
            appState.game = null;
            appState.currentPlayerIndex = 0;
            saveState();

            document.getElementById('app').innerHTML = `
                <h1>🎮 Choisir un jeu</h1>
                <p class="subtitle">Sélectionne le mode de jeu à utiliser.</p>

                <div class="card">
                    <label style="display:flex; align-items:center; justify-content:space-between; gap:12px; font-weight:700;">
                        <span>Mode sombre</span>
                        <input type="checkbox" id="theme-toggle" ${localStorage.getItem(THEME_KEY) === 'dark' ? 'checked' : ''} onchange="toggleTheme(this.checked)">
                    </label>
                </div>

                <div class="card game-grid">
                    <button class="game-button primary" onclick="showScoreSetup()">
                        <strong>Score</strong>
                        <small>Ajout de totaux jusqu’à 9999 par joueur</small>
                    </button>
                    <button class="game-button" onclick="showZinchSetup()">
                        <strong>Zinch</strong>
                        <small>Score, zinch et historique des tours</small>
                    </button>
                    <button class="game-button" onclick="showComingSoon('Fléchette')">
                        <strong>Fléchette</strong>
                        <small>Bientôt disponible</small>
                    </button>
                </div>
            `;
        }

        function toggleTheme(isDark) {
            applyTheme(isDark ? 'dark' : 'light');
        }

        function showScoreSetup() {
            appState.screen = 'player-count';
            appState.game = 'score';
            saveState();
            renderPlayerSetupScreen('🧮 Nombre de joueurs', 'Choisis le nombre de participants pour le compteur Score.', 'handleScorePlayerCountSubmit');
        }

        function showZinchSetup() {
            appState.screen = 'player-count';
            appState.game = 'zinch';
            saveState();
            renderPlayerSetupScreen('🎲 Nombre de joueurs', 'Choisis le nombre de participants pour le jeu Zinch.', 'handleZinchPlayerCountSubmit');
        }

        function renderPlayerSetupScreen(title, subtitle, submitHandlerName) {
            const count = appState.playerCount && appState.playerCount > 0 ? appState.playerCount : 3;
            const nameInputsMarkup = Array.from({ length: count }, (_, index) => {
                const defaultValue = index === 0 ? 'Rachel' : index === 1 ? 'Alexis' : `Joueur ${index + 1}`;
                return `
                    <div class="field-row">
                        <div class="field">
                            <label for="player-name-${index + 1}">Joueur ${index + 1}</label>
                            <input id="player-name-${index + 1}" class="setup-name-input is-muted" type="text" value="${defaultValue}" placeholder="Joueur ${index + 1}" autocomplete="off" onfocus="this.classList.remove('is-muted'); if (this.value === '${defaultValue}') this.value = ''" onblur="if (!this.value.trim()) { this.value = '${defaultValue}'; this.classList.add('is-muted'); } else { this.classList.remove('is-muted'); }">
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('app').innerHTML = `
                <h1>${title}</h1>
                <p class="subtitle">${subtitle}</p>

                <div class="card">
                    <form id="player-count-form" onsubmit="return ${submitHandlerName}(event)">
                        <div class="field-row">
                            <div class="field">
                                <label for="playerCount">Nombre de joueurs</label>
                                <input id="playerCount" name="playerCount" type="number" min="1" max="5" value="${count}" required oninput="refreshPlayerNameFields(this.value)">
                            </div>
                        </div>
                        <div id="player-name-fields">${nameInputsMarkup}</div>
                        <div class="actions" style="margin-top: 14px;">
                            <button class="btn-reset" type="submit">Commencer</button>
                            <button class="btn-secondary" type="button" onclick="renderHome()">Retour</button>
                        </div>
                    </form>
                </div>
            `;
        }

        function refreshPlayerNameFields(value) {
            const count = parseInt(value, 10);
            if (Number.isNaN(count) || count < 1 || count > 5) return;

            const existingValues = Array.from(document.querySelectorAll('.setup-name-input')).map(input => input.value.trim());
            const container = document.getElementById('player-name-fields');
            if (!container) return;

            const nameInputsMarkup = Array.from({ length: count }, (_, index) => {
                const defaultValue = index === 0 ? 'Rachel' : index === 1 ? 'Alexis' : `Joueur ${index + 1}`;
                const currentValue = existingValues[index] || defaultValue;
                const isMuted = !existingValues[index] ? 'is-muted' : '';
                return `
                    <div class="field-row">
                        <div class="field">
                            <label for="player-name-${index + 1}">Joueur ${index + 1}</label>
                            <input id="player-name-${index + 1}" class="setup-name-input ${isMuted}" type="text" value="${currentValue}" placeholder="Joueur ${index + 1}" onfocus="this.classList.remove('is-muted'); if (this.value === '${defaultValue}') this.value = ''" onblur="if (!this.value.trim()) { this.value = '${defaultValue}'; this.classList.add('is-muted'); } else { this.classList.remove('is-muted'); }">
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = nameInputsMarkup;
        }

        function collectPlayerNames(count) {
            return Array.from({ length: count }, (_, index) => {
                const input = document.getElementById(`player-name-${index + 1}`);
                const name = input ? input.value.trim() : '';
                return name || `Joueur ${index + 1}`;
            });
        }

        function handleScorePlayerCountSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('playerCount');
            const count = parseInt(input.value, 10);

            if (Number.isNaN(count) || count < 1 || count > 5) {
                alert('Le nombre de joueurs doit être compris entre 1 et 5.');
                return false;
            }

            startScoreGame(count, collectPlayerNames(count));
            return false;
        }

        function handleZinchPlayerCountSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('playerCount');
            const count = parseInt(input.value, 10);

            if (Number.isNaN(count) || count < 1 || count > 5) {
                alert('Le nombre de joueurs doit être compris entre 1 et 5.');
                return false;
            }

            startZinchGame(count, collectPlayerNames(count));
            return false;
        }

        function startScoreGame(playerCount, playerNames = []) {
            appState.screen = 'score';
            appState.game = 'score';
            appState.playerCount = playerCount;
            appState.currentPlayerIndex = 0;
            appState.players = Array.from({ length: playerCount }, (_, index) => ({
                id: index + 1,
                name: playerNames[index] || `Joueur ${index + 1}`,
                score: 0,
                history: []
            }));
            saveState();
            renderScoreboard();
        }

        function startZinchGame(playerCount, playerNames = []) {
            appState.screen = 'zinch';
            appState.game = 'zinch';
            appState.playerCount = playerCount;
            appState.currentPlayerIndex = 0;
            appState.players = Array.from({ length: playerCount }, (_, index) => ({
                id: index + 1,
                name: playerNames[index] || `Joueur ${index + 1}`,
                score: 0,
                entries: []
            }));
            saveState();
            renderZinchBoard();
        }

        function renderScoreboard() {
            appState.screen = 'score';
            saveState();

            const playersMarkup = appState.players.map(player => `
                <div class="player-card">
                    <div class="player-name">
                        <input class="player-name-input" type="text" value="${player.name}" placeholder="Joueur" oninput="updatePlayerName(${player.id}, this.value)">
                    </div>
                    <div class="score-display" id="score-${player.id}">${player.score}</div>
                    <div class="score-controls">
                        <input class="score-input" id="input-${player.id}" type="number" min="0" max="9999" step="1" value="0" placeholder="0">
                        <div class="icon-btn-container">
                            <button class="icon-btn icon-btn-green" onclick="addScore(${player.id})" aria-label="Valider l'ajout">=</button>
                        </div>
                        <div class="buttons">
                            <button class="btn-plus" onclick="updateScore(${player.id}, 1)">+</button>
                            <button class="btn-minus" onclick="updateScore(${player.id}, -1)">-</button>
                            <button class="icon-btn icon-btn-red" onclick="undoLastAddition(${player.id})" aria-label="Annuler le dernier ajout">←</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('app').innerHTML = `
                <h1>🏆 Score</h1>
                <p class="subtitle">Compteur de points en cours · ${appState.players.length} joueur(s)</p>

                <div class="players-container">
                    ${playersMarkup}
                </div>

                <div class="actions" style="margin-top: 6px;">
                    <button class="btn-secondary" onclick="undoLastAction()">Annuler la dernière action</button>
                    <button class="btn-secondary" onclick="renderHome()">Choisir un autre jeu</button>
                    <button class="btn-reset" onclick="resetScores()">Réinitialiser la partie</button>
                </div>
            `;
        }

        function renderZinchBoard() {
            appState.screen = 'zinch';
            saveState();

            const currentPlayer = appState.players[appState.currentPlayerIndex] || appState.players[0];
            const defaultZinchValue = typeof appState.nextZinchValue === 'number' && appState.nextZinchValue > 0 ? appState.nextZinchValue : 250;
            appState.nextZinchValue = defaultZinchValue;
            const winnerPlayer = appState.players.find(player => player.id === appState.winnerId);
            const playersMarkup = appState.players.map(player => {
                const isCurrent = player.id === currentPlayer?.id;
                const historyEntries = [...player.entries];
                const zinchStreak = getConsecutiveZinchCount(player);
                const isRed = zinchStreak > 0 && zinchStreak % 3 === 2;
                const linesMarkup = historyEntries.map(entry => `
                    <span class="zinch-line ${entry.type === 'zinch' ? 'zinch' : ''}">${entry.type === 'zinch' ? 'Z' : entry.value}</span>
                `).join('');

                return `
                    <div class="zinch-player-card ${isCurrent ? 'active' : ''} ${isRed ? 'red' : ''}">
                        <div class="zinch-player-top">
                            <input class="player-name-input" type="text" value="${player.name}" placeholder="Joueur" oninput="updatePlayerName(${player.id}, this.value)" autocomplete="off">
                            <div class="zinch-total">${player.score}</div>
                        </div>
                        <div class="zinch-last-lines">${linesMarkup}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('app').innerHTML = `
                <h1>🎲 Zinch</h1>
                <p class="subtitle">Tour de ${currentPlayer ? currentPlayer.name : '...'}</p>
                <div class="zinch-current">${currentPlayer ? currentPlayer.name : '...'}</div>
                ${winnerPlayer ? `<div class="zinch-winner">🏆 Gagnant : ${winnerPlayer.name}</div>` : ''}
                ${appState.gameFinished ? `<div class="zinch-winner zinch-winner-finished">Partie terminée après un Zinch.</div>` : ''}

                <div class="card">
                    <div class="zinch-controls">
                        <input id="zinch-score-input" class="zinch-input" type="number" min="50" max="10000" step="50" value="${defaultZinchValue}" placeholder="250">
                        <button class="btn-plus" onclick="addZinchScore()">Ajouter</button>
                        <button class="btn-minus" onclick="addZinchZ()">Zinch</button>
                        <button class="zinch-undo-btn" onclick="undoLastAction()">Annuler</button>
                    </div>
                </div>

                <div class="players-container">
                    ${playersMarkup}
                </div>

                <div class="actions" style="margin-top: 6px;">
                    <button class="btn-secondary" onclick="renderHome()">Choisir un autre jeu</button>
                    <button class="btn-reset" onclick="resetZinchGame()">Réinitialiser la partie</button>
                </div>
            `;
        }

        function updateScore(id, value) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player) return;

            saveUndoSnapshot();
            if (value !== 0) {
                player.history.push({ delta: value });
            }
            player.score += value;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
        }

        function updatePlayerName(id, value) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player) return;

            player.name = value.trim() || `Joueur ${id}`;
            saveState();
        }

        function addScore(id) {
            const player = appState.players.find(entry => entry.id === id);
            const input = document.getElementById(`input-${id}`);
            if (!player || !input) return;

            saveUndoSnapshot();

            const value = parseInt(input.value, 10);
            if (Number.isNaN(value)) {
                input.value = '';
                return;
            }

            const safeValue = Math.max(0, Math.min(9999, value));
            if (safeValue > 0) {
                player.history.push({ delta: safeValue });
            }
            player.score += safeValue;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
            input.value = '';
        }

        function undoLastAddition(id) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player || player.history.length === 0) return;

            const lastAction = player.history.pop();
            player.score -= lastAction.delta;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
        }

        function addZinchScore() {
            if (appState.gameFinished) return;

            const currentPlayer = appState.players[appState.currentPlayerIndex];
            if (!currentPlayer) return;

            saveUndoSnapshot();

            const input = document.getElementById('zinch-score-input');
            const rawValue = input.value.trim();
            const parsedValue = parseInt(rawValue, 10);
            const value = Number.isNaN(parsedValue) || rawValue === ''
                ? (typeof appState.nextZinchValue === 'number' && appState.nextZinchValue > 0 ? appState.nextZinchValue : 250)
                : parsedValue;
            if (value < 50 || value > 10000 || value % 50 !== 0) {
                alert('Le score doit être un multiple de 50 compris entre 50 et 10000.');
                return;
            }

            const previousPlayer = appState.players[(appState.currentPlayerIndex - 1 + appState.players.length) % appState.players.length];
            let requiredMinimum = 250;
            if (previousPlayer && previousPlayer.id !== currentPlayer.id) {
                for (let i = previousPlayer.entries.length - 1; i >= 0; i--) {
                    const entry = previousPlayer.entries[i];
                    if (entry.type === 'zinch') {
                        requiredMinimum = 250;
                        break;
                    }
                    if (entry.type === 'score') {
                        requiredMinimum = entry.value + 50;
                        break;
                    }
                }
            }
            if (previousPlayer && previousPlayer.id !== currentPlayer.id && value < requiredMinimum) {
                currentPlayer.entries.push({ type: 'zinch' });
                appState.nextZinchValue = 250;
                saveState();
                advanceToNextPlayer();
                renderZinchBoard();
                return;
            }

            currentPlayer.entries.push({ type: 'score', value });
            currentPlayer.score += value;
            if (!appState.winnerId && currentPlayer.score >= 10000) {
                appState.winnerId = currentPlayer.id;
            }
            appState.nextZinchValue = value;
            saveState();
            advanceToNextPlayer();
            renderZinchBoard();
        }

        function addZinchZ() {
            if (appState.gameFinished) return;

            const currentPlayer = appState.players[appState.currentPlayerIndex];
            if (!currentPlayer) return;

            saveUndoSnapshot();

            currentPlayer.entries.push({ type: 'zinch' });
            const streak = getConsecutiveZinchCount(currentPlayer);
            if (streak >= 3) {
                currentPlayer.score -= 1000;
            }
            if (appState.winnerId) {
                appState.gameFinished = true;
            }
            appState.nextZinchValue = 250;
            saveState();
            advanceToNextPlayer();
            renderZinchBoard();
        }

        function getConsecutiveZinchCount(player) {
            let streak = 0;
            for (let i = player.entries.length - 1; i >= 0; i--) {
                if (player.entries[i].type === 'zinch') {
                    streak += 1;
                } else if (player.entries[i].type === 'score') {
                    break;
                } else {
                    break;
                }
            }
            return streak;
        }

        function advanceToNextPlayer() {
            if (appState.players.length === 0) {
                appState.currentPlayerIndex = 0;
                return;
            }
            appState.currentPlayerIndex = (appState.currentPlayerIndex + 1) % appState.players.length;
        }

        function resetScores() {
            if (!confirm('Recommencer cette partie ?')) return;

            appState.players = appState.players.map(player => ({ ...player, score: 0, history: [] }));
            saveState();
            renderScoreboard();
        }

        function resetZinchGame() {
            if (!confirm('Recommencer cette partie ?')) return;

            appState.players = appState.players.map(player => ({ ...player, score: 0, entries: [] }));
            appState.currentPlayerIndex = 0;
            appState.nextZinchValue = 250;
            appState.winnerId = null;
            appState.gameFinished = false;
            saveState();
            renderZinchBoard();
        }

        function showComingSoon(gameName) {
            alert(`${gameName} sera disponible prochainement.`);
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (appState.screen === 'score' && appState.game === 'score' && appState.players.length > 0) {
                renderScoreboard();
            } else if (appState.screen === 'zinch' && appState.game === 'zinch' && appState.players.length > 0) {
                renderZinchBoard();
            } else if (appState.screen === 'player-count' && appState.game === 'score') {
                showScoreSetup();
            } else if (appState.screen === 'player-count' && appState.game === 'zinch') {
                showZinchSetup();
            } else {
                renderHome();
            }
            registerServiceWorker();
        });
    </script>
</body>
</html>
