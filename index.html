        function getYamsCategory(key) {
            return YAMS_CATEGORIES.find(c => c.key === key);
        }

        // Points rapportés par une case selon son état stocké.
        // number  : compte de dés 1..5 (× valeur du chiffre), 'X' = barré (0)
        // combo   : 'V' = réussie (valeur fixe), 'X' = barrée (0)
        // input   : nombre saisi (+ / − / chance)
        function getYamsCellPoints(category, state) {
            if (state === undefined || state === null) return 0;
            if (category.type === 'number') {
                return state === 'X' ? 0 : state * category.face;
            }
            if (category.type === 'combo') {
                return state === 'V' ? category.value : 0;
            }
            return Number(state) || 0;
        }

        function countCompletedYamsCategories(player) {
            const cells = player.yamsCells || {};
            return YAMS_CATEGORIES.filter(c => Object.prototype.hasOwnProperty.call(cells, c.key)).length;
        }

        function recalcYamsTotals(player) {
            const cells = player.yamsCells || {};
            const upperKeys = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
            player.yamsUpperTotal = upperKeys.reduce((sum, key) => sum + getYamsCellPoints(getYamsCategory(key), cells[key]), 0);
            player.yamsBonus = player.yamsUpperTotal >= 63 ? 35 : 0;

            // Section + / − : (Plus − Moins) × nombre de 1 (case "1")
            const onesState = cells['ones'];
            const onesCount = (onesState === undefined || onesState === 'X') ? 0 : onesState;
            let plusMinus = 0;
            if (cells['plus'] !== undefined && cells['minus'] !== undefined) {
                plusMinus = (Number(cells['plus']) - Number(cells['minus'])) * onesCount;
            }
            player.yamsPlusMinus = plusMinus;

            const comboKeys = ['threeKind', 'fourKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yams'];
            const combosTotal = comboKeys.reduce((sum, key) => sum + getYamsCellPoints(getYamsCategory(key), cells[key]), 0);

            const chance = cells['chance'] !== undefined ? Number(cells['chance']) : 0;

            player.score = player.yamsUpperTotal + player.yamsBonus + plusMinus + combosTotal + chance;
        }

        function renderYamsCell(player, category, isCurrent) {
            const cells = player.yamsCells || {};
            const has = Object.prototype.hasOwnProperty.call(cells, category.key);
            const state = cells[category.key];

            let display = '';
            let cls = '';
            if (category.type === 'number') {
                if (state === 'X') { display = '✗'; cls = 'barre'; }
                else if (has) { display = state * category.face; cls = 'filled'; }
            } else if (category.type === 'combo') {
                if (state === 'X') { display = '✗'; cls = 'barre'; }
                else if (state === 'V') { display = category.value; cls = 'filled'; }
                else if (isCurrent) { display = category.value; cls = 'ghost'; } // valeur potentielle (colonne active uniquement)
            } else {
                if (has) { display = state; cls = 'filled'; }
            }

            const shown = display === '' ? '—' : display;

            if (isCurrent) {
                const handler = category.type === 'input'
                    ? `promptYamsInput('${category.key}')`
                    : category.type === 'combo'
                        ? `cycleYamsCombo('${category.key}')`
                        : `cycleYamsNumber('${category.key}')`;
                return `<td class="current"><button class="yams-cell-btn ${cls}" onclick="${handler}">${shown}</button></td>`;
            }
            return `<td><span class="yams-cell ${cls}">${shown}</span></td>`;
        }

        function renderYamsBoard() {
            appState.screen = 'yams';
            saveState();

            const currentPlayer = appState.players[appState.currentPlayerIndex] || appState.players[0];

            const summaryMarkup = appState.players.map((player, index) => `
                <div class="game-summary-card ${index === appState.currentPlayerIndex ? 'current' : ''}">
                    <div class="game-summary-name">${player.name}</div>
                    <div class="game-summary-score">${player.score || 0}</div>
                    <small>${countCompletedYamsCategories(player)}/${YAMS_CATEGORIES.length} · prime ${player.yamsBonus || 0}</small>
                </div>
            `).join('');

            const sheetHeader = appState.players.map((player, index) => `
                <th class="${index === appState.currentPlayerIndex ? 'current' : ''}" title="${player.name}">${player.name}</th>
            `).join('');

            const sheetRows = YAMS_CATEGORIES.map((category, catIndex) => {
                const rowCells = appState.players
                    .map((player, index) => renderYamsCell(player, category, index === appState.currentPlayerIndex))
                    .join('');
                // Séparateur visuel avant les + / − (après le 6) et avant le brelan
                const sep = category.key === 'plus' || category.key === 'threeKind' ? ' yams-row-sep' : '';
                return `<tr class="yams-row-${category.type}${sep}"><td>${category.label}</td>${rowCells}</tr>`;
            }).join('');

            // Ligne total (1-6) + prime
            const upperRow = appState.players.map((player, index) =>
                `<td class="${index === appState.currentPlayerIndex ? 'current' : ''}"><span class="yams-cell total">${player.yamsUpperTotal || 0}${player.yamsBonus ? ' +' + player.yamsBonus : ''}</span></td>`
            ).join('');

            document.getElementById('app').innerHTML = `
                <div class="game-header">
                    <h1>🎲 Yams</h1>
                    <div class="game-header-turn">Tour de <span class="current-player-name">${currentPlayer ? currentPlayer.name : '...'}</span></div>
                </div>

                <div class="card yams-sheet-wrap">
                    <table class="yams-sheet">
                        <thead>
                            <tr>
                                <th>Case</th>
                                ${sheetHeader}
                            </tr>
                        </thead>
                        <tbody>
                            ${sheetRows}
                            <tr class="yams-row-total"><td>Total ⬆ (prime ≥63)</td>${upperRow}</tr>
                        </tbody>
                    </table>
                </div>

                <div class="game-summary-grid">${summaryMarkup}</div>

                <div class="actions" style="margin-top: 6px;">
                    <button class="btn-reset" onclick="nextYamsPlayer()">Joueur suivant →</button>
                    <button class="btn-secondary" onclick="renderHome()">A quoi on joue ?</button>
                    <button class="btn-secondary" onclick="resetYamsGame()">Réinitialiser la partie</button>
                </div>

                <div id="yams-input-container"></div>
            `;
        }

        function cycleYamsNumber(key) {
            const player = appState.players[appState.currentPlayerIndex];
            if (!player) return;
            if (!player.yamsCells) player.yamsCells = {};
            const cur = player.yamsCells[key];
            // vide → 1 → 2 → 3 → 4 → 5 → ✗ → vide
            let next;
            if (cur === undefined) next = 1;
            else if (cur === 'X') next = undefined;
            else if (cur >= 5) next = 'X';
            else next = cur + 1;

            if (next === undefined) delete player.yamsCells[key];
            else player.yamsCells[key] = next;

            recalcYamsTotals(player);
            saveState();
            renderYamsBoard();
        }

        function cycleYamsCombo(key) {
            const player = appState.players[appState.currentPlayerIndex];
            if (!player) return;
            if (!player.yamsCells) player.yamsCells = {};
            const cur = player.yamsCells[key];
            // vide → réussie (V) → barrée (X) → vide
            let next;
            if (cur === undefined) next = 'V';
            else if (cur === 'V') next = 'X';
            else next = undefined;

            if (next === undefined) delete player.yamsCells[key];
            else player.yamsCells[key] = next;

            recalcYamsTotals(player);
            saveState();
            renderYamsBoard();
        }

        function promptYamsInput(key) {
            const player = appState.players[appState.currentPlayerIndex];
            if (!player) return;
            if (!player.yamsCells) player.yamsCells = {};
            const category = getYamsCategory(key);
            const cur = player.yamsCells[key];
            const container = document.getElementById('yams-input-container');
            if (!container) return;

            container.innerHTML = `
                <div class="darts-picker-modal active" id="yams-input-modal" onclick="closeYamsInput(event)">
                    <div class="darts-picker-content yams-input-content" onclick="event.stopPropagation()">
                        <h3 class="yams-input-title">${category.label} — points</h3>
                        <p class="yams-input-hint">Entre une valeur de ${YAMS_INPUT_MIN} à ${YAMS_INPUT_MAX}</p>
                        <input id="yams-input-field" class="yams-input-field" type="number" inputmode="numeric" min="${YAMS_INPUT_MIN}" max="${YAMS_INPUT_MAX}" value="${cur !== undefined ? cur : ''}" placeholder="${YAMS_INPUT_MIN}–${YAMS_INPUT_MAX}" onkeydown="if(event.key==='Enter'){event.preventDefault(); confirmYamsInput('${key}');}">
                        <div class="yams-input-actions">
                            <button class="btn-reset" onclick="confirmYamsInput('${key}')">Valider</button>
                            <button class="btn-secondary" onclick="clearYamsInput('${key}')">Effacer</button>
                            <button class="btn-secondary" onclick="closeYamsInput()">Annuler</button>
                        </div>
                    </div>
                </div>
            `;

            const field = document.getElementById('yams-input-field');
            if (field) { field.focus(); field.select(); }
        }

        function confirmYamsInput(key) {
            const player = appState.players[appState.currentPlayerIndex];
            if (!player) return;
            if (!player.yamsCells) player.yamsCells = {};
            const field = document.getElementById('yams-input-field');
            if (!field) return;

            const trimmed = String(field.value).trim();
            if (trimmed === '') {
                clearYamsInput(key);
                return;
            }
            const value = parseInt(trimmed, 10);
            if (Number.isNaN(value) || value < YAMS_INPUT_MIN || value > YAMS_INPUT_MAX) {
                alert(`Veuillez entrer un nombre entre ${YAMS_INPUT_MIN} et ${YAMS_INPUT_MAX}.`);
                return;
            }

            player.yamsCells[key] = value;
            recalcYamsTotals(player);
            closeYamsInput();
            saveState();
            renderYamsBoard();
        }

        function clearYamsInput(key) {
            const player = appState.players[appState.currentPlayerIndex];
            if (player && player.yamsCells) {
                delete player.yamsCells[key];
                recalcYamsTotals(player);
            }
            closeYamsInput();
            saveState();
            renderYamsBoard();
        }

        function closeYamsInput(event) {
            if (event && event.target && event.target.id !== 'yams-input-modal') return;
            const container = document.getElementById('yams-input-container');
            if (container) container.innerHTML = '';
        }

        function nextYamsPlayer() {
            const everyoneFinished = appState.players.every(player => countCompletedYamsCategories(player) >= YAMS_CATEGORIES.length);
            if (everyoneFinished) {
                const winner = [...appState.players].sort((a, b) => (b.score || 0) - (a.score || 0))[0];
                saveState();
                alert(`🏆 ${winner.name} gagne au Yams avec ${winner.score || 0} points !`);
                renderHome();
                return;
            }

            appState.currentPlayerIndex = (appState.currentPlayerIndex + 1) % appState.players.length;
            saveState();
            renderYamsBoard();
        }

        function reset421Game() {
            if (!confirm('Recommencer cette partie ?')) return;
            const playerNames = appState.players.map(player => player.name);
            start421Game(appState.playerCount, playerNames);
        }

        function resetYamsGame() {
            if (!confirm('Recommencer cette partie ?')) return;
            const playerNames = appState.players.map(player => player.name);
            startYamsGame(appState.playerCount, playerNames);
        }

        function updateScore(id, value) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player) return;

            saveUndoSnapshot();
            if (value !== 0) {
                player.history.push({ delta: value });
            }
            player.score += value;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
        }

        function updatePlayerName(id, value) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player) return;

            player.name = value.trim() || `Joueur ${id}`;
            saveState();
        }

        function addScore(id) {
            const player = appState.players.find(entry => entry.id === id);
            const input = document.getElementById(`input-${id}`);
            if (!player || !input) return;

            saveUndoSnapshot();

            const value = parseInt(input.value, 10);
            if (Number.isNaN(value)) {
                input.value = '';
                return;
            }

            const safeValue = Math.max(0, Math.min(9999, value));
            if (safeValue > 0) {
                player.history.push({ delta: safeValue });
            }
            player.score += safeValue;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
            input.value = '';
        }

        function undoLastAddition(id) {
            const player = appState.players.find(entry => entry.id === id);
            if (!player || player.history.length === 0) return;

            const lastAction = player.history.pop();
            player.score -= lastAction.delta;
            saveState();

            const scoreEl = document.getElementById(`score-${id}`);
            if (scoreEl) {
                scoreEl.textContent = player.score;
            }
        }

        function addZinchPlus50() {
            const input = document.getElementById('zinch-score-input');
            if (!input) return;

            const currentValue = parseInt(input.value, 10) || getDefaultZinchTurnValue();
            const newValue = currentValue + 50;
            
            if (newValue <= 10000) {
                input.value = newValue;
            }
        }

        function removeZinchMinus50() {
            const input = document.getElementById('zinch-score-input');
            if (!input) return;

            const currentValue = parseInt(input.value, 10) || getDefaultZinchTurnValue();
            input.value = Math.max(50, currentValue - 50);
        }

        function addZinchScore() {
            if (appState.gameFinished) return;

            const currentPlayer = appState.players[appState.currentPlayerIndex];
            if (!currentPlayer) return;

            const input = document.getElementById('zinch-score-input');
            const rawValue = input.value.trim();
            const parsedValue = parseInt(rawValue, 10);
            const value = Number.isNaN(parsedValue) || rawValue === ''
                ? getDefaultZinchTurnValue()
                : parsedValue;
            if (value < 50 || value > 10000 || value % 50 !== 0) {
                alert('Le score doit être un multiple de 50 compris entre 50 et 10000.');
                return;
            }

            const previousPlayer = appState.players[(appState.currentPlayerIndex - 1 + appState.players.length) % appState.players.length];
            let requiredMinimum = 250;
            if (previousPlayer && previousPlayer.id !== currentPlayer.id) {
                for (let i = previousPlayer.entries.length - 1; i >= 0; i--) {
                    const entry = previousPlayer.entries[i];
                    if (entry.type === 'zinch') {
                        requiredMinimum = 250;
                        break;
                    }
                    if (entry.type === 'score') {
                        requiredMinimum = entry.value + 50;
                        break;
                    }
                }
            }

            saveUndoSnapshot();

            if (previousPlayer && previousPlayer.id !== currentPlayer.id && value < requiredMinimum) {
                currentPlayer.entries.push({ type: 'zinch' });
                currentPlayer.zinchConsecutiveCount = (currentPlayer.zinchConsecutiveCount || 0) + 1;
                if (currentPlayer.zinchConsecutiveCount === 3) {
                    currentPlayer.score -= 1000;
                    currentPlayer.zinchConsecutiveCount = 0;
                }
                appState.nextZinchValue = DEFAULT_ZINCH_VALUE;
                saveState();
                advanceToNextPlayer();
                renderZinchBoard();
                return;
            }

            currentPlayer.entries.push({ type: 'score', value });
            currentPlayer.score += value;
            currentPlayer.zinchConsecutiveCount = 0;
            if (!appState.winnerId && currentPlayer.score >= 10000) {
                appState.winnerId = currentPlayer.id;
            }
            appState.nextZinchValue = DEFAULT_ZINCH_VALUE;
            saveState();
            advanceToNextPlayer();
            renderZinchBoard();
        }

        function addZinchZ() {
            if (appState.gameFinished) return;

            const currentPlayer = appState.players[appState.currentPlayerIndex];
            if (!currentPlayer) return;

            saveUndoSnapshot();

            currentPlayer.entries.push({ type: 'zinch' });
            currentPlayer.zinchConsecutiveCount = (currentPlayer.zinchConsecutiveCount || 0) + 1;
            if (currentPlayer.zinchConsecutiveCount === 3) {
                currentPlayer.score -= 1000;
                currentPlayer.zinchConsecutiveCount = 0;
            }
            if (appState.winnerId) {
                appState.gameFinished = true;
            }
            appState.nextZinchValue = DEFAULT_ZINCH_VALUE;
            saveState();
            advanceToNextPlayer();
            renderZinchBoard();
        }

        function selectInputText(inputElement) {
            if (!inputElement) return;
            inputElement.select();
        }

        function getDefaultZinchTurnValue() {
            if (!Array.isArray(appState.players) || appState.players.length === 0) {
                return DEFAULT_ZINCH_VALUE;
            }

            const currentIndex = appState.currentPlayerIndex || 0;
            const previousIndex = (currentIndex - 1 + appState.players.length) % appState.players.length;
            const previousPlayer = appState.players[previousIndex];

            if (!previousPlayer || !Array.isArray(previousPlayer.entries) || previousPlayer.entries.length === 0) {
                return DEFAULT_ZINCH_VALUE;
            }

            for (let i = previousPlayer.entries.length - 1; i >= 0; i--) {
                const entry = previousPlayer.entries[i];
                if (entry.type === 'zinch') {
                    return DEFAULT_ZINCH_VALUE;
                }
                if (entry.type === 'score' && typeof entry.value === 'number') {
                    return entry.value;
                }
            }

            return DEFAULT_ZINCH_VALUE;
        }

        function getConsecutiveZinchCount(player) {
            if (!player) return 0;
            if (typeof player.zinchConsecutiveCount === 'number') {
                return player.zinchConsecutiveCount;
            }

            let streak = 0;
            for (let i = player.entries.length - 1; i >= 0; i--) {
                if (player.entries[i].type === 'zinch') {
                    streak += 1;
                } else if (player.entries[i].type === 'score') {
                    break;
                } else {
                    break;
                }
            }
            player.zinchConsecutiveCount = streak % 3;
            return player.zinchConsecutiveCount;
        }

        function advanceToNextPlayer() {
            if (appState.players.length === 0) {
                appState.currentPlayerIndex = 0;
                return;
            }
            appState.currentPlayerIndex = (appState.currentPlayerIndex + 1) % appState.players.length;
        }

        function resetScores() {
            if (!confirm('Recommencer cette partie ?')) return;

            appState.players = appState.players.map(player => ({ ...player, score: 0, history: [] }));
            saveState();
            renderScoreboard();
        }

        function resetZinchGame() {
            if (!confirm('Recommencer cette partie ?')) return;

            appState.players = appState.players.map(player => ({ ...player, score: 0, entries: [], zinchConsecutiveCount: 0 }));
            appState.currentPlayerIndex = 0;
            appState.nextZinchValue = DEFAULT_ZINCH_VALUE;
            appState.winnerId = null;
            appState.gameFinished = false;
            saveState();
            renderZinchBoard();
        }

        function showComingSoon(gameName) {
            alert(`${gameName} sera disponible prochainement.`);
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        window.addEventListener('beforeunload', () => {
            flushSaveState();
        });

        window.addEventListener('pagehide', () => {
            flushSaveState();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                flushSaveState();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (appState.screen === 'score' && appState.game === 'score' && appState.players.length > 0) {
                renderScoreboard();
            } else if (appState.screen === 'zinch' && appState.game === 'zinch' && appState.players.length > 0) {
                renderZinchBoard();
            } else if (appState.screen === '421' && appState.game === '421' && appState.players.length > 0) {
                render421Board();
            } else if (appState.screen === 'yams' && appState.game === 'yams' && appState.players.length > 0) {
                renderYamsBoard();
            } else if (appState.screen === 'player-count' && appState.game === 'score') {
                showScoreSetup();
            } else if (appState.screen === 'player-count' && appState.game === 'zinch') {
                showZinchSetup();
            } else if (appState.screen === 'player-count' && appState.game === '421') {
                show421Setup();
            } else if (appState.screen === 'player-count' && appState.game === 'yams') {
                showYamsSetup();
            } else {
                renderHome();
            }
            registerServiceWorker();
        });
    </script>
</body>
</html>
