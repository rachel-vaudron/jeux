<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f74e6"/>
      <stop offset="1" stop-color="#1f5bd8"/>
    </linearGradient>
    <linearGradient id="die" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2fb"/>
    </linearGradient>
  </defs>
  <!-- Fond plein (zone de sécurité maskable) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dé -->
  <rect x="118" y="118" width="276" height="276" rx="52" fill="url(#die)" stroke="#cdd6ee" stroke-width="4"/>
  <!-- 5 points -->
  <g fill="#1f5bd8">
    <circle cx="186" cy="186" r="26"/>
    <circle cx="326" cy="186" r="26"/>
    <circle cx="256" cy="256" r="26"/>
    <circle cx="186" cy="326" r="26"/>
    <circle cx="326" cy="326" r="26"/>
  </g>
</svg>
